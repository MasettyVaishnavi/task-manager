<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light" onload="checkAuth(); loadTasks();">

<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">Task Manager</span>
    <button onclick="logout()" class="btn btn-danger">Logout</button>
  </div>
</nav>

<div class="container mt-4">

  <div class="card p-3 shadow mb-4">
    <h5>Create New Task</h5>
    <input type="text" id="title" class="form-control mb-2" placeholder="Title">
    <input type="text" id="description" class="form-control mb-2" placeholder="Description">
    <input type="date" id="due_date" class="form-control mb-2">
    <button onclick="createTask()" class="btn btn-primary">Add Task</button>
  </div>

  <div class="row" id="taskList"></div>

</div>

<script src="js/script.js"></script>
</body>
</html>
