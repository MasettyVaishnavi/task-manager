<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow">
    <h3 class="text-center">Register</h3>

    <input type="text" id="name" class="form-control mb-3" placeholder="Name">
    <input type="email" id="email" class="form-control mb-3" placeholder="Email">
    <input type="password" id="password" class="form-control mb-3" placeholder="Password">

    <button onclick="register()" class="btn btn-primary w-100">Register</button>

    <p class="mt-3 text-center">
      Already have account? <a href="login.html">Login</a>
    </p>
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
